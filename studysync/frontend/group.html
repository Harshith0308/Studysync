<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync - Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col">
    <div id="waiting-room" class="hidden fixed inset-0 bg-gray-100 z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-lg shadow-md p-8 max-w-lg w-full text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Waiting for approval</h2>
            <p class="text-gray-600 mb-6">Your request to join this study room is pending. The room creator will approve it soon.</p>
            <div class="flex justify-center">
                <a href="dashboard.html" class="text-blue-600 hover:underline">Back to Dashboard</a>
            </div>
        </div>
    </div>
    
    <!-- Navbar -->
    <nav class="bg-white shadow-lg shrink-0">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </a>
                    <span id="group-title" class="text-xl font-bold text-blue-600">Loading...</span>
                    <span id="group-code" class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-sm font-mono"></span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="leave-group-btn" class="text-red-500 hover:text-red-700 font-medium text-sm">Leave Group</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-1 flex overflow-hidden max-w-7xl mx-auto w-full p-4 gap-4">
        
        <!-- Sidebar: Members & Tasks -->
        <aside class="w-1/4 bg-white rounded-lg shadow-md p-4 flex flex-col overflow-y-auto">
            <div class="mb-6">
                <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">Members (<span id="member-count">0</span>)</h3>
                <ul id="members-list" class="space-y-2 text-sm text-gray-600">
                    <!-- Members here -->
                </ul>
            </div>

            <div id="join-requests-section" class="hidden mb-6">
                <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">Join Requests</h3>
                <div id="join-requests-list" class="space-y-2 text-sm"></div>
            </div>

            <div class="flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-2 border-b pb-1">
                    <h3 class="font-bold text-gray-700">Tasks</h3>
                    <button id="add-task-btn" class="text-blue-500 text-xs hover:underline">+ Add</button>
                </div>
                <div id="tasks-list" class="space-y-2 overflow-y-auto flex-1">
                    <!-- Tasks here -->
                </div>
            </div>
        </aside>

        <!-- Main: Chat & Notes -->
        <main class="w-3/4 flex flex-col gap-4">
            
            <!-- Tabs -->
            <div class="bg-white rounded-lg shadow-sm p-2 flex space-x-2 shrink-0">
                <button id="tab-chat" class="flex-1 py-2 text-center rounded bg-blue-100 text-blue-700 font-medium transition">Chat</button>
                <button id="tab-notes" class="flex-1 py-2 text-center rounded text-gray-500 hover:bg-gray-50 transition">Notes & Files</button>
                <button id="tab-ai" class="flex-1 py-2 text-center rounded text-gray-500 hover:bg-gray-50 transition">AI Assistant</button>
            </div>

            <!-- Chat Section -->
            <div id="chat-section" class="flex-1 bg-white rounded-lg shadow-md flex flex-col overflow-hidden">
                <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
                    <!-- Messages -->
                </div>
                <div class="p-4 bg-white border-t">
                    <form id="chat-form" class="flex gap-2">
                        <input id="chat-input" type="text" class="flex-1 border rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Type a message..." autocomplete="off">
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Send</button>
                    </form>
                </div>
            </div>

            <!-- Notes Section (Hidden by default) -->
            <div id="notes-section" class="flex-1 bg-white rounded-lg shadow-md flex flex-col overflow-hidden hidden">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-gray-700">Shared Files</h3>
                    <form id="upload-form" class="flex items-center gap-2">
                        <input type="text" id="note-title" class="border rounded px-3 py-2 text-sm w-40" placeholder="Title" required>
                        <input type="text" id="note-desc" class="border rounded px-3 py-2 text-sm w-56" placeholder="Description (optional)">
                        <input type="file" id="note-file" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" accept=".pdf,.doc,.docx" required>
                        <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700">Upload</button>
                    </form>
                </div>
                <div id="notes-list" class="flex-1 p-4 overflow-y-auto grid grid-cols-2 md:grid-cols-3 gap-4 content-start">
                    <!-- Notes -->
                </div>
            </div>

            <div id="ai-section" class="flex-1 bg-white rounded-lg shadow-md flex flex-col overflow-hidden hidden">
                <div class="p-4 border-b bg-gray-50">
                    <h3 class="font-bold text-gray-700">AI Assistant</h3>
                    <p class="text-xs text-gray-500 mt-1">Ask for explanations, summaries, and study help for this group.</p>
                </div>
                <div id="ai-messages" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50"></div>
                <div class="p-4 bg-white border-t">
                    <form id="ai-form" class="flex gap-2">
                        <input id="ai-input" type="text" class="flex-1 border rounded px-3 py-2 focus:outline-none focus:border-blue-500" placeholder="Ask the AI..." autocomplete="off">
                        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700">Ask</button>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!-- Task Modal -->
    <div id="task-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4">Add Task</h3>
            <form id="task-form">
                <input id="task-title" type="text" class="border rounded w-full mb-3 px-3 py-2" placeholder="Task title" required>
                <input id="task-date" type="date" class="border rounded w-full mb-4 px-3 py-2">
                <div class="flex justify-end gap-2">
                    <button type="button" id="close-task-modal" class="text-gray-500 hover:text-gray-700">Cancel</button>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Add</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/group.js"></script>
</body>
</html>
